<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission - ScholarPoint Coaching</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/icon.img.png" type="image/png">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="courses.html">Courses</a>
            <a href="admission.html">Admission</a>
        </nav>
    </header>

    <div class="container">
        <h1>ScholarPoint Coaching Institute</h1>
        <h2>Admission Form</h2>

        <form action="submit_form.php" method="POST" class="admission-form">
            <div class="form-group">
                <label for="student_name">Student Name:</label>
                <input type="text" id="student_name" name="student_name" required>
            </div>

            <div>
                <label for="phone">Phone Number:</label>
            </div>
            <div class="form-group">
                <input type="text" id="phone" name="phone" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="course">Select Course:</label>
                <select id="course" name="course" required>
                    <option>-- Choose a Course --</option>
                    <option value="Full-Stack Development">Full-Stack Development</option>
                    <option value="Python Programming">Python Programming</option>
                    <option value="BCA (1st Year - Final Year)">BCA (1st Year - Final Year)</option>
                    <option value="DCA">DCA</option>
                    <option value="Cyber-Security">Cyber-Security</option>
                    <option value="Java">Java</option>
                </select>
            </div>

            <div class="form-group">
                <label>Gender:</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="gender" value="Male"> Male
                    </label>
                    <label>
                        <input type="radio" name="gender" value="Female"> Female
                    </label>
                    <label>
                        <input type="radio" name="gender" value="Other"> Other
                    </label>
                </div>
            </div>
            <div>
                <label for="address">Address:</label>
                <input type="text" id="address" name="address" required>
            </div>

            <button type="submit" class="Button">Submit</button>
        </form>

        <div class="back-link">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>
</body>
</html>
